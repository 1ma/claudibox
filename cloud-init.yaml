#cloud-config

package_update: true
package_upgrade: true

timezone: Europe/Andorra

packages:
  - 7zip
  - bash-completion
  - bubblewrap
  - ca-certificates
  - curl
  - git
  - htop
  - jq
  - mariadb-client
  - nano
  - net-tools
  - php-cli
  - php-curl
  - php-zip
  - postgresql-client
  - ripgrep
  - socat
  - tree
  - unzip
  - yq

users:
  - name: claudi
    shell: /bin/bash
    lock_passwd: true

write_files:
  - path: /home/claudi/.claude/CLAUDE.md
    owner: claudi:claudi
    permissions: "0644"
    defer: true
    content: |
      # Pautes globals per al Claudi (sí, et diré Claudi)

      ## Idioma i to
      Respon sempre en català amb un to formal.
      Malgrat això, tota la producció de codi i de documentació ha de ser sempre en anglès si no indico una altra cosa explícitament.

      ## Política de Git
      No has de fer commits tu directament a cap projecte Git.
      Qualsevol canvi que proposis fés-lo només localment (prèvia aprovació) sense ni afegir-lo al staging area del repo.

      ## Entorn d'execució
      Corres dins d'una màquina virtual, no directament al host. Però les aplicacions en les que treballaràs generalment corren en Docker exposades al host, no dins de la teva VM.
      Per tant per accedir a les aplicacions que s'estàn desenvolupant al host et caldrà saber la seva IP a on conectar, i a vegades ajustar la resolució del DNS.
      - IP del host: `ip route show default | awk '{print $3}'` (típicament la gateway per defecte).
      - No tens sudo ni root dins la VM.
      - Per accedir a serveis del host que escolten amb hostname (e.g. pàgina web com ara `app.localhost` servida amb Caddy), cal usar `curl --resolve hostname:port:<host_ip>` o el header `Host`, ja que `*.localhost` resol a 127.0.0.1 dins la VM.
      - Quan no es fa servir hostname (e.g. una API oberta en clar a un port TCP qualsevol) pots accedir directament per IP:PORT sense preocupar-se del hostname.

  - path: /home/claudi/.claude/settings.json
    owner: claudi:claudi
    permissions: "0644"
    defer: true
    content: |
      {
        "permissions": {
          "allow": [
            "Read",
            "Grep",
            "Glob",
            "Bash(cat:*)",
            "Bash(curl:*)",
            "Bash(find:*)",
            "Bash(grep:*)",
            "Bash(head:*)",
            "Bash(jq:*)",
            "Bash(ls:*)",
            "Bash(tail:*)",
            "Bash(wc:*)",
            "Bash(yq:*)"
          ],
          "defaultMode": "default"
        },
        "model": "claude-opus-4-6",
        "sandbox": {
          "enabled": true,
          "failIfUnavailable": true,
          "autoAllowBashIfSandboxed": true,
          "network": {
            "allowedDomains": [
              "api.anthropic.com"
            ]
          },
          "filesystem": {
            "denyRead": [
              "/"
            ],
            "allowRead": [
              "~/workspace",
              "~/.claude"
            ]
          }
        },
        "effortLevel": "medium",
        "theme": "dark"
      }

runcmd:
  - php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
  - php -r "if (hash_file('sha384', 'composer-setup.php') === 'c8b085408188070d5f52bcfe4ecfbee5f727afa458b2573b8eaaf77b3419b0bf2768dc67c86944da1544f06fa544fd47') { echo 'Installer verified'.PHP_EOL; } else { echo 'Installer corrupt'.PHP_EOL; unlink('composer-setup.php'); exit(1); }"
  - HOME=/root php composer-setup.php --install-dir=/usr/local/bin --filename=composer
  - php -r "unlink('composer-setup.php');"
  - curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
  - apt-get install -y nodejs
  - npm install -g @anthropic-ai/claude-code
