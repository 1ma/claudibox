#cloud-config

package_update: true
package_upgrade: true

timezone: Europe/Andorra

packages:
  - bash-completion
  - bubblewrap
  - ca-certificates
  - curl
  - git
  - htop
  - jq
  - php-cli
  - net-tools
  - ripgrep
  - socat
  - tree

users:
  - name: claudi
    shell: /bin/bash
    lock_passwd: true

write_files:
  - path: /home/claudi/.claude/CLAUDE.md
    owner: claudi:claudi
    permissions: "0644"
    defer: true
    content: |
      # Pautes globals per al Claudi (sí, et diré Claudi)

      ## Idioma i to
      Respon sempre en català amb un to formal.
      Malgrat això, tota la producció de code i de documentació ha de ser per defecte en anglès.

      ## Entorn d'execució
      Corro dins d'una màquina virtual. Les aplicacions del projecte generalment corren en Docker exposades al host, no dins de la VM.
      Per tant per accedir a les aplicacions que s'estàn desenvolupament cal saber la IP del host i a vegades ajustar la resolució del DNS.
      - IP del host: `ip route show default | awk '{print $3}'` (típicament la gateway per defecte).
      - No tinc sudo ni root dins la VM.
      - Per accedir a serveis del host que escolten amb hostname (e.g. pàgina web com ara `app.localhost` servida amb Caddy), cal usar `curl --resolve hostname:port:<host_ip>` o el header `Host`, ja que `*.localhost` resol a 127.0.0.1 dins la VM.
      - Quan no es fa servir hostname (e.g. una API oberta en clar a un port TCP qualsevol) es pot atacar directament per IP:PORT sense preocupar-se del hostname.

  - path: /home/claudi/.claude/settings.json
    owner: claudi:claudi
    permissions: "0644"
    defer: true
    content: |
      {
        "permissions": {
          "allow": [
            "Read",
            "Grep",
            "Glob"
          ],
          "defaultMode": "plan"
        },
        "model": "claude-opus-4-6",
        "sandbox": {
          "enabled": true,
          "failIfUnavailable": true,
          "autoAllowBashIfSandboxed": true,
          "network": {
            "allowedDomains": [
              "api.anthropic.com"
            ]
          },
          "filesystem": {
            "denyRead": [
              "/"
            ],
            "allowRead": [
              "~/workspace",
              "~/.claude"
            ]
          }
        },
        "effortLevel": "medium",
        "theme": "dark"
      }

runcmd:
  - curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
  - apt-get install -y nodejs
  - npm install -g @anthropic-ai/claude-code
